name: Send Project Reminders

on:
  schedule:
    # Runs at 06:00 UTC = 10:00 Tbilisi (UTC+4)
    - cron: '0 6 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub

permissions:
  contents: write   # needed to commit updated lastSent back to data.json

jobs:
  check-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send reminders
        run: node check_reminders.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit updated timestamps
        run: |
          git config user.name  "Projects Bot"
          git config user.email "bot@noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update reminder timestamps"
          git push
