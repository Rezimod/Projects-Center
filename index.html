<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0A0A0F;
  --bg2:       #0D0D16;
  --bg3:       #11111A;
  --surface:   rgba(255,255,255,0.04);
  --surface2:  rgba(255,255,255,0.07);
  --border:    rgba(255,255,255,0.08);
  --border-h:  rgba(255,255,255,0.14);
  --accent:    #6C63FF;
  --accent2:   #9C63FF;
  --accent-glow: rgba(108,99,255,0.35);
  --text:      #EEEEFF;
  --text2:     #7A799A;
  --text3:     #3E3D55;
  --sb-w:      220px;
  --sb-collapsed: 68px;
  --font-h:    'Syne', sans-serif;
  --font-b:    'DM Sans', sans-serif;
  --r:         14px;
  --r-sm:      8px;
  --r-lg:      20px;
  --ease:      cubic-bezier(0.4, 0, 0.2, 1);
  --spring:    cubic-bezier(0.34, 1.56, 0.64, 1);
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--bg);
  background-image: radial-gradient(rgba(108,99,255,0.06) 1px, transparent 1px);
  background-size: 28px 28px;
  color: var(--text);
  font-family: var(--font-b);
  display: flex;
  -webkit-font-smoothing: antialiased;
}

/* ─── Scrollbar ─────────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(108,99,255,0.4); }

/* ─── Sidebar ───────────────────────────────────────────────────────────────── */
.sidebar {
  width: var(--sb-w);
  min-width: var(--sb-w);
  height: 100%;
  background: linear-gradient(175deg, #0D0D18 0%, #0A0A0F 100%);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 26px 0 24px;
  position: relative;
  z-index: 20;
  transition: width 0.32s var(--ease), min-width 0.32s var(--ease);
  overflow: hidden;
}
.sidebar.collapsed {
  width: var(--sb-collapsed);
  min-width: var(--sb-collapsed);
}

/* Toggle button */
.sb-toggle {
  position: absolute;
  top: 26px;
  right: -13px;
  width: 26px;
  height: 26px;
  background: #15151E;
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text2);
  z-index: 30;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
}
.sb-toggle:hover {
  background: rgba(108,99,255,0.15);
  border-color: rgba(108,99,255,0.4);
  color: var(--accent);
}
.sb-toggle svg {
  width: 11px; height: 11px;
  transition: transform 0.32s var(--ease);
}
.sidebar.collapsed .sb-toggle svg { transform: rotate(180deg); }

/* Logo */
.sb-logo {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 0 20px 28px;
  overflow: hidden;
}
.sb-logo-icon {
  width: 34px; height: 34px; min-width: 34px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(108,99,255,0.4);
}
.sb-logo-icon svg { width: 16px; height: 16px; fill: #fff; }
.sb-logo-text {
  font-family: var(--font-h);
  font-size: 14.5px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  opacity: 1;
  transition: opacity 0.2s;
}
.sidebar.collapsed .sb-logo-text { opacity: 0; }

/* Nav */
.sb-nav {
  flex: 1;
  padding: 0 10px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  overflow: hidden;
}

.sb-sep {
  height: 1px;
  background: var(--border);
  margin: 10px 10px;
  opacity: 0.6;
}

.sb-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 12px;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  white-space: nowrap;
  border: 1px solid transparent;
  transition: background 0.18s, border-color 0.18s;
}

/* Gradient underline on hover */
.sb-item::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width 0.35s var(--ease);
}
.sb-item:hover::after { width: 100%; }

.sb-item:hover {
  background: rgba(108,99,255,0.07);
}
.sb-item.active {
  background: linear-gradient(135deg, rgba(108,99,255,0.22), rgba(156,99,255,0.12));
  border-color: rgba(108,99,255,0.28);
}
.sb-item.active::after { display: none; }

.sb-icon {
  width: 18px; height: 18px; min-width: 18px;
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  transition: color 0.18s;
}
.sb-item:hover .sb-icon { color: var(--accent); }
.sb-item.active .sb-icon { color: #fff; }

.sb-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  flex: 1;
  transition: color 0.18s, opacity 0.25s;
}
.sb-item:hover .sb-label { color: var(--text); }
.sb-item.active .sb-label { color: #fff; font-weight: 600; }
.sidebar.collapsed .sb-label { opacity: 0; }

.sb-badge {
  font-size: 10.5px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
  background: rgba(108,99,255,0.18);
  color: #9C8FFF;
  line-height: 1.6;
  transition: opacity 0.2s;
}
.sidebar.collapsed .sb-badge { opacity: 0; }

/* Sidebar footer */
.sb-footer {
  padding: 18px 10px 0;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}

/* ─── Main ──────────────────────────────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ─── Topbar ─────────────────────────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 36px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,0.7);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  position: sticky;
  top: 0;
  z-index: 10;
  flex-shrink: 0;
}
.topbar-left { display: flex; flex-direction: column; gap: 2px; }
.topbar-date {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.topbar-greeting {
  font-family: var(--font-h);
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.025em;
}
.topbar-right { display: flex; align-items: center; gap: 10px; }
.tb-icon-btn {
  width: 36px; height: 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  transition: background 0.18s, border-color 0.18s, color 0.18s;
}
.tb-icon-btn:hover {
  background: rgba(108,99,255,0.1);
  border-color: rgba(108,99,255,0.3);
  color: var(--accent);
}
.btn-new {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 17px;
  background: linear-gradient(135deg, #6C63FF, #9C63FF);
  border: none;
  border-radius: 9px;
  font-family: var(--font-b);
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(108,99,255,0.38);
  transition: transform 0.18s var(--ease), box-shadow 0.18s;
  white-space: nowrap;
}
.btn-new:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 28px rgba(108,99,255,0.55);
}
.btn-new svg { width: 13px; height: 13px; }

/* ─── Content ────────────────────────────────────────────────────────────────── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 30px 36px 40px;
}

/* ─── Stats Row ──────────────────────────────────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 34px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
  overflow: hidden;
  cursor: default;
  transition: border-color 0.2s, box-shadow 0.2s;
}
/* Shimmer line at top on hover */
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(108,99,255,0.5) 50%, transparent 100%);
  opacity: 0;
  transition: opacity 0.25s;
}
.stat-card:hover::before { opacity: 1; }
.stat-card:hover {
  border-color: rgba(108,99,255,0.18);
  box-shadow: 0 0 28px rgba(108,99,255,0.05), 0 4px 20px rgba(0,0,0,0.2);
}
.stat-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.stat-label {
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding-top: 2px;
}
.stat-icon-wrap {
  width: 30px; height: 30px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.stat-bottom {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 8px;
}
.stat-number {
  font-family: var(--font-h);
  font-size: 38px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
  letter-spacing: -0.04em;
}
.stat-number .unit {
  font-size: 20px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: -0.02em;
}
.sparkline-svg { display: block; overflow: visible; }

/* ─── Section Header ─────────────────────────────────────────────────────────── */
.section-hdr {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-family: var(--font-h);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}
.section-sub {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}
.view-all {
  font-size: 12.5px;
  color: var(--accent);
  font-weight: 500;
  cursor: pointer;
  opacity: 0.75;
  transition: opacity 0.18s;
}
.view-all:hover { opacity: 1; }

/* ─── Projects Grid ──────────────────────────────────────────────────────────── */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 34px;
}

.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px 20px 18px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  opacity: 0;
  transform: translateY(20px);
  transition:
    transform 0.28s cubic-bezier(0.34,1.56,0.64,1),
    box-shadow 0.28s var(--ease),
    border-color 0.2s;
}
.project-card:hover {
  transform: translateY(-4px) !important;
  border-color: var(--border-h);
}

/* Left accent bar */
.card-bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
}

/* Glow overlay */
.card-glow {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s;
  border-radius: var(--r);
}
.project-card:hover .card-glow { opacity: 1; }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 12px;
}
.card-title {
  font-family: var(--font-h);
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.015em;
  line-height: 1.35;
  flex: 1;
  padding-right: 10px;
}

/* Progress ring */
.ring-wrap {
  position: relative;
  width: 68px; height: 68px; min-width: 68px;
}
.ring-wrap svg {
  width: 68px; height: 68px;
  transform: rotate(-90deg);
}
.ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 4; }
.ring-fill {
  fill: none;
  stroke-width: 4;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.2s cubic-bezier(0.25, 1, 0.5, 1);
}
.ring-label {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-h);
  font-size: 12.5px;
  font-weight: 700;
  color: var(--text);
}

.card-desc {
  font-size: 12.5px;
  color: var(--text2);
  line-height: 1.65;
  margin-bottom: 16px;
}
.card-footer {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3.5px 8px;
  border-radius: 20px;
  font-size: 11.5px;
  font-weight: 500;
  line-height: 1.5;
  white-space: nowrap;
}
.chip-tasks {
  background: rgba(108,99,255,0.12);
  color: #9C8FFF;
  border: 1px solid rgba(108,99,255,0.18);
}
.chip-freq {
  background: rgba(255,255,255,0.05);
  color: var(--text2);
  border: 1px solid var(--border);
}
.chip-due {
  margin-left: auto;
  background: rgba(255,255,255,0.04);
  color: var(--text3);
  border: 1px solid rgba(255,255,255,0.06);
}

/* ─── Activity Feed ──────────────────────────────────────────────────────────── */
.activity-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 40px;
}
.activity-item {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 14px 22px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
}
.activity-item:last-child { border-bottom: none; }
.activity-item:hover { background: rgba(255,255,255,0.02); }
.act-dot {
  width: 7px; height: 7px; min-width: 7px;
  border-radius: 50%;
}
.act-text {
  flex: 1;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
}
.act-text strong { color: var(--text); font-weight: 500; }
.act-time {
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

/* ─── Keyframes ──────────────────────────────────────────────────────────────── */
@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════ SIDEBAR ═══════════════════════════ -->
<aside class="sidebar" id="sidebar">

  <button class="sb-toggle" id="sbToggle" title="Collapse sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </button>

  <!-- Logo -->
  <div class="sb-logo">
    <div class="sb-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="sb-logo-text">Projects Center</span>
  </div>

  <!-- Nav -->
  <nav class="sb-nav">
    <div class="sb-item active">
      <span class="sb-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </span>
      <span class="sb-label">Dashboard</span>
    </div>

    <div class="sb-item">
      <span class="sb-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
        </svg>
      </span>
      <span class="sb-label">Projects</span>
      <span class="sb-badge">6</span>
    </div>

    <div class="sb-item">
      <span class="sb-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </span>
      <span class="sb-label">Timeline</span>
    </div>

    <div class="sb-item">
      <span class="sb-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </span>
      <span class="sb-label">Tasks</span>
      <span class="sb-badge">24</span>
    </div>

    <div class="sb-item">
      <span class="sb-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </span>
      <span class="sb-label">Analytics</span>
    </div>

    <div class="sb-sep"></div>

    <div class="sb-item">
      <span class="sb-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/>
        </svg>
      </span>
      <span class="sb-label">Settings</span>
    </div>
  </nav>

  <!-- Footer -->
  <div class="sb-footer">
    <div class="sb-item">
      <span class="sb-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </span>
      <span class="sb-label">Profile</span>
    </div>
  </div>
</aside>

<!-- ═══════════════════════════════════════ MAIN ═══════════════════════════════ -->
<div class="main">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-date" id="topDate">—</div>
      <div class="topbar-greeting">Today We Make Something Special</div>
    </div>
    <div class="topbar-right">
      <button class="tb-icon-btn" title="Search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button class="tb-icon-btn" title="Notifications">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
      </button>
      <button class="btn-new">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Project
      </button>
    </div>
  </div>

  <!-- Content -->

/* ═══════════════════════════════════════════════════════════════
   SPARKLINE
═══════════════════════════════════════════════════════════════ */
function generateSparkData(count = 12, trend = 0.6) {
  const pts = [];
  let v = 30 + Math.random() * 20;
  for (let i = 0; i < count; i++) {
    v += (Math.random() - (0.5 - trend * 0.3)) * 12;
    v = Math.max(4, Math.min(96, v));
    pts.push(v);
  }
  return pts;
}

function drawSparkline(svgEl, color) {
  const W = 80, H = 36;
  const data = generateSparkData();
  const min = Math.min(...data), max = Math.max(...data);
  const range = (max - min) || 1;
  const pad = 2;

  const xs = data.map((_, i) => pad + (i / (data.length - 1)) * (W - pad * 2));
  const ys = data.map(v => H - pad - ((v - min) / range) * (H - pad * 2));

  // Smooth bezier path
  let d = `M ${xs[0]} ${ys[0]}`;
  for (let i = 1; i < xs.length; i++) {
    const cpx1 = (xs[i - 1] + xs[i]) / 2;
    d += ` C ${cpx1} ${ys[i - 1]}, ${cpx1} ${ys[i]}, ${xs[i]} ${ys[i]}`;
  }

  // Fill area
  const fillD = d + ` L ${xs[xs.length-1]} ${H} L ${xs[0]} ${H} Z`;
  const fillId = 'sg' + Math.random().toString(36).slice(2);
  svgEl.innerHTML = `
    <defs>
      <linearGradient id="${fillId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.28"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${fillD}" fill="url(#${fillId})"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  `;
}

/* ═══════════════════════════════════════════════════════════════
   COUNT-UP
═══════════════════════════════════════════════════════════════ */
function countUp(el, target, suffix, duration = 1400) {
  const start = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    // Ease out cubic
    const ease = 1 - Math.pow(1 - t, 3);
    const val = Math.round(ease * target);
    el.innerHTML = val + (suffix ? `<span class="unit">${suffix}</span>` : '');
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

const CIRC = 2 * Math.PI * 28; // r=28, viewBox 68x68, cx=34 cy=34

function buildRing(progress, accent) {
  const offset = CIRC * (1 - progress / 100);
  const ringId = 'r' + Math.random().toString(36).slice(2);
  return `
    <div class="ring-wrap">
      <svg viewBox="0 0 68 68">
        <circle class="ring-bg" cx="34" cy="34" r="28"/>
        <circle class="ring-fill" id="${ringId}"
          cx="34" cy="34" r="28"
          stroke="${accent}"
          stroke-dasharray="${CIRC}"
          stroke-dashoffset="${CIRC}"
        />
      </svg>
      <div class="ring-label">${progress}%</div>
    </div>
  `;
}
